<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>گەنجینە - سادە</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#0b1120;color:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:12px;}
#box{background:#1e293b;border-radius:24px;padding:24px 18px;width:100%;max-width:480px;border:1px solid #334155;}
h2{text-align:center;color:#38bdf8;margin-bottom:18px;font-size:24px;}
input{width:100%;padding:12px 16px;margin-bottom:12px;background:#0f172a;border:1px solid #334155;border-radius:40px;color:#fff;font-size:15px;outline:none;}
input:focus{border-color:#38bdf8;}
button{width:100%;padding:12px;border:none;border-radius:40px;background:#38bdf8;color:#0f172a;font-weight:700;font-size:16px;cursor:pointer;transition:0.3s;}
button:hover{background:#facc15;}
.err{color:#f87171;background:#451a1a;padding:10px;border-radius:30px;text-align:center;margin-bottom:12px;font-size:14px;}
.hidden{display:none !important;}
.switch{text-align:center;margin-top:14px;color:#94a3b8;font-size:14px;}
.switch span{color:#38bdf8;font-weight:600;cursor:pointer;}
.panel{background:#1e293b;border-radius:16px;padding:14px;margin-top:14px;border:1px solid #334155;}
.panel h3{color:#facc15;margin-bottom:10px;font-size:17px;}
.panel table{width:100%;border-collapse:collapse;font-size:13px;}
.panel th{text-align:right;padding:6px 4px;border-bottom:2px solid #334155;color:#94a3b8;}
.panel td{padding:6px 4px;border-bottom:1px solid #1e293b;}
.panel .btn-sm{border:none;padding:2px 10px;border-radius:30px;font-weight:700;cursor:pointer;font-size:11px;}
.btn-owner{background:#facc15;color:#0f172a;}
.btn-del{background:#ef4444;color:#fff;}
.stats{display:flex;gap:8px;flex-wrap:wrap;background:#1e293b;padding:8px 14px;border-radius:40px;margin-bottom:14px;justify-content:space-around;font-size:13px;}
.stats span{color:#fff;font-weight:700;}
.flex-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.flex-row input{flex:1;min-width:80px;padding:8px 14px;border-radius:30px;background:#0f172a;border:1px solid #334155;color:#fff;outline:none;font-size:13px;margin-bottom:0;}
.flex-row button{padding:8px 16px;border:none;border-radius:30px;font-weight:700;cursor:pointer;font-size:13px;width:auto;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:10px;}
.card-item{background:#1e293b;border-radius:16px;padding:14px;border:1px solid #334155;text-align:center;}
.card-item .icon{font-size:36px;margin-bottom:6px;}
.card-item .title{font-weight:700;font-size:15px;}
.card-item .ver{color:#94a3b8;font-size:12px;}
.card-item .del{background:#ef4444;border:none;color:#fff;padding:2px 12px;border-radius:30px;cursor:pointer;font-size:12px;margin-top:6px;}
</style>
</head>
<body>

<div id="box">

  <!-- ===== چوونەژوورەوە ===== -->
  <div id="loginPage">
    <h2>گەنجینەی سۆفت</h2>
    <div id="err" class="err hidden"></div>
    <input type="text" id="user" placeholder="ناوی بەکارهێنەر" value="admin">
    <input type="password" id="pass" placeholder="وشەی نهێنی" value="1234">
    <button id="loginBtn">چوونەژوورەوە</button>
    <div class="switch">هەژمارت نییە؟ <span id="gotoReg">تۆمار بکە</span></div>
  </div>

  <!-- ===== تۆمارکردن ===== -->
  <div id="registerPage" class="hidden">
    <h2>تۆمارکردن</h2>
    <div id="err2" class="err hidden"></div>
    <input type="text" id="regUser" placeholder="ناوی بەکارهێنەر">
    <input type="password" id="regPass" placeholder="وشەی نهێنی">
    <button id="regBtn">تۆمارکردن</button>
    <div class="switch">هەژمارت هەیە؟ <span id="gotoLog">بچۆ ژوورەوە</span></div>
  </div>

  <!-- ===== پەڕەی سەرەکی ===== -->
  <div id="mainPage" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
      <span style="font-size:20px;font-weight:800;color:#38bdf8;">گەنجینە</span>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <span style="background:#1e293b;padding:4px 14px;border-radius:30px;border:1px solid #334155;font-size:13px;" id="displayName">بەکارهێنەر</span>
        <span style="background:#facc15;color:#0f172a;padding:2px 12px;border-radius:30px;font-weight:700;font-size:11px;" id="displayRole">user</span>
        <button id="logoutBtn" style="background:transparent;border:1px solid #ef4444;color:#ef4444;padding:4px 14px;border-radius:30px;cursor:pointer;font-weight:600;font-size:13px;">دەرچوون</button>
      </div>
    </div>

    <!-- ئامار -->
    <div class="stats">
      <div>کۆی بەکارهێنەران: <span id="totalUsers">0</span></div>
      <div>چوونەژوورەوە: <span id="loggedIn">0</span></div>
      <div>سەردان: <span id="visits">0</span></div>
    </div>

    <!-- پانێڵی خاوەن -->
    <div id="ownerPanel" class="panel hidden">
      <h3>پانێڵی بەڕێوەبردن</h3>
      <div class="flex-row">
        <input type="text" id="searchUser" placeholder="گەڕان بە ناو...">
        <button id="searchBtn" style="background:#38bdf8;color:#0f172a;">گەڕان</button>
      </div>
      <div style="overflow-x:auto;margin-top:8px;">
        <table>
          <thead><tr><th>ناو</th><th>ڕۆڵ</th><th>ئایپ</th><th>کردار</th></tr></thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
      <div class="flex-row" style="margin-top:10px;padding-top:10px;border-top:1px solid #334155;">
        <input type="text" id="newUserName" placeholder="ناوی نوێ">
        <input type="text" id="newUserPass" placeholder="وشەی نهێنی">
        <button id="addUserBtn" style="background:#22c55e;color:#0f172a;">زیاد</button>
      </div>
    </div>

    <!-- کارتەکان -->
    <div style="margin-top:16px;font-size:17px;font-weight:700;border-right:4px solid #facc15;padding-right:10px;">پرۆگرامەکان</div>
    <div id="cardGrid" class="card-grid"></div>

    <!-- زیادکردنی کارت (تەنها خاوەن) -->
    <div id="addCardArea" class="hidden" style="display:flex;flex-wrap:wrap;gap:6px;background:#1e293b;padding:10px 12px;border-radius:40px;margin-top:12px;border:1px solid #334155;">
      <input type="text" id="newCardTitle" placeholder="ناوی پرۆگرام" style="flex:1;min-width:80px;padding:8px 14px;border-radius:30px;background:#0f172a;border:1px solid #334155;color:#fff;outline:none;font-size:13px;">
      <input type="text" id="newCardVer" placeholder="وەشان" style="flex:0.5;min-width:60px;padding:8px 14px;border-radius:30px;background:#0f172a;border:1px solid #334155;color:#fff;outline:none;font-size:13px;">
      <button id="addCardBtn" style="padding:8px 18px;border:none;border-radius:30px;background:#22c55e;color:#0f172a;font-weight:700;cursor:pointer;">زیاد</button>
    </div>
  </div>
</div>

<script>
// ======================== داتا ========================
let DATA = {
  users: [
    { username: 'admin', password: '1234', role: 'owner', ip: '192.168.1.1', lastLogin: null }
  ],
  cards: [
    { id: 1, title: 'Photoshop', version: '2025', desc: 'دیزاین', icon: 'fa-adobe' },
    { id: 2, title: 'GTA V', version: '1.0', desc: 'یاری', icon: 'fa-gamepad' },
    { id: 3, title: 'Office', version: '2024', desc: 'Word, Excel', icon: 'fa-file-word' }
  ],
  visits: 0,
  lastDate: ''
};

let currentUser = null;

try {
  const saved = localStorage.getItem('my_simple_data');
  if (saved) {
    const parsed = JSON.parse(saved);
    if (parsed.users && parsed.cards) DATA = parsed;
  }
} catch(e) {}

function saveData() {
  localStorage.setItem('my_simple_data', JSON.stringify(DATA));
}

// ======================== DOM ========================
const loginPage = document.getElementById('loginPage');
const registerPage = document.getElementById('registerPage');
const mainPage = document.getElementById('mainPage');
const err = document.getElementById('err');
const err2 = document.getElementById('err2');
const userInput = document.getElementById('user');
const passInput = document.getElementById('pass');
const loginBtn = document.getElementById('loginBtn');
const regUser = document.getElementById('regUser');
const regPass = document.getElementById('regPass');
const regBtn = document.getElementById('regBtn');
const gotoReg = document.getElementById('gotoReg');
const gotoLog = document.getElementById('gotoLog');
const logoutBtn = document.getElementById('logoutBtn');
const displayName = document.getElementById('displayName');
const displayRole = document.getElementById('displayRole');
const totalUsers = document.getElementById('totalUsers');
const loggedIn = document.getElementById('loggedIn');
const visits = document.getElementById('visits');
const ownerPanel = document.getElementById('ownerPanel');
const usersTable = document.getElementById('usersTable');
const searchUser = document.getElementById('searchUser');
const searchBtn = document.getElementById('searchBtn');
const newUserName = document.getElementById('newUserName');
const newUserPass = document.getElementById('newUserPass');
const addUserBtn = document.getElementById('addUserBtn');
const cardGrid = document.getElementById('cardGrid');
const addCardArea = document.getElementById('addCardArea');
const newCardTitle = document.getElementById('newCardTitle');
const newCardVer = document.getElementById('newCardVer');
const addCardBtn = document.getElementById('addCardBtn');

// ======================== فرمانەکان ========================
function showErr(msg) {
  err.textContent = msg;
  err.classList.remove('hidden');
  err2.classList.add('hidden');
}
function showErr2(msg) {
  err2.textContent = msg;
  err2.classList.remove('hidden');
  err.classList.add('hidden');
}
function hideErr() {
  err.classList.add('hidden');
  err2.classList.add('hidden');
}

function updateStats() {
  totalUsers.textContent = DATA.users.length;
  const logged = DATA.users.filter(u => u.lastLogin !== null).length;
  loggedIn.textContent = logged;
  const today = new Date().toDateString();
  if (DATA.lastDate !== today) {
    DATA.visits = 1;
    DATA.lastDate = today;
  } else {
    DATA.visits += 1;
  }
  visits.textContent = DATA.visits;
  saveData();
}

function renderCards() {
  cardGrid.innerHTML = '';
  if (DATA.cards.length === 0) {
    cardGrid.innerHTML = '<p style="color:#94a3b8;grid-column:1/-1;text-align:center;">هیچ پرۆگرامێک نییە.</p>';
    return;
  }
  const isOwner = currentUser && currentUser.role === 'owner';
  DATA.cards.forEach(c => {
    const div = document.createElement('div');
    div.className = 'card-item';
    div.innerHTML = `
      <div class="icon">📦</div>
      <div class="title">${c.title}</div>
      <div class="ver">${c.version || '—'}</div>
      <div style="font-size:12px;color:#cbd5e1;margin:4px 0;">${c.desc || ''}</div>
      ${isOwner ? `<button class="del" data-id="${c.id}">سڕینەوە</button>` : ''}
    `;
    cardGrid.appendChild(div);
  });
  document.querySelectorAll('.del').forEach(btn => {
    btn.onclick = function() {
      const id = parseInt(this.getAttribute('data-id'));
      if (confirm('دڵنیای؟')) {
        DATA.cards = DATA.cards.filter(c => c.id !== id);
        saveData();
        renderCards();
      }
    };
  });
}

function renderOwnerPanel(filter = '') {
  const isOwner = currentUser && currentUser.role === 'owner';
  if (!isOwner) {
    ownerPanel.classList.add('hidden');
    addCardArea.classList.add('hidden');
    return;
  }
  ownerPanel.classList.remove('hidden');
  addCardArea.classList.remove('hidden');

  let users = DATA.users;
  const q = filter.trim().toLowerCase();
  if (q) users = users.filter(u => u.username.toLowerCase().includes(q));

  usersTable.innerHTML = '';
  if (users.length === 0) {
    usersTable.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94a3b8;">هیچ بەکارهێنەرێک نەدۆزرایەوە.</td></tr>';
    return;
  }
  users.forEach(u => {
    const tr = document.createElement('tr');
    const roleColor = u.role === 'owner' ? '#facc15' : '#38bdf8';
    tr.innerHTML = `
      <td>${u.username}</td>
      <td><span style="background:${roleColor};color:#0f172a;padding:2px 12px;border-radius:30px;font-weight:700;font-size:11px;">${u.role}</span></td>
      <td>${u.ip || '—'}</td>
      <td>
        ${u.role !== 'owner' ? `<button class="makeOwner" data-user="${u.username}" style="background:#facc15;border:none;padding:2px 12px;border-radius:30px;font-weight:700;cursor:pointer;font-size:11px;">خاوەن</button>` : ''}
        <button class="delUser" data-user="${u.username}" style="background:#ef4444;border:none;padding:2px 12px;border-radius:30px;color:#fff;cursor:pointer;font-size:11px;">سڕینەوە</button>
      </td>
    `;
    usersTable.appendChild(tr);
  });

  document.querySelectorAll('.makeOwner').forEach(btn => {
    btn.onclick = function() {
      const uname = this.getAttribute('data-user');
      const user = DATA.users.find(u => u.username === uname);
      if (user) {
        user.role = 'owner';
        saveData();
        renderOwnerPanel(searchUser.value);
        if (currentUser && currentUser.username === uname) {
          currentUser.role = 'owner';
          displayRole.textContent = 'owner';
        }
        updateStats();
      }
    };
  });

  document.querySelectorAll('.delUser').forEach(btn => {
    btn.onclick = function() {
      const uname = this.getAttribute('data-user');
      if (currentUser && currentUser.username === uname) {
        alert('ناتوانیت خۆت بسڕیتەوە.');
        return;
      }
      if (confirm(`سڕینەوەی "${uname}"؟`)) {
        DATA.users = DATA.users.filter(u => u.username !== uname);
        saveData();
        renderOwnerPanel(searchUser.value);
        updateStats();
      }
    };
  });
}

function refreshAll() {
  updateStats();
  renderCards();
  renderOwnerPanel(searchUser.value);
}

// ======================== چوونەژوورەوە (وەرگرتنی ناو و وشەی نهێنی) ========================
function doLogin(username, password) {
  hideErr();
  const user = DATA.users.find(u => u.username === username && u.password === password);
  if (!user) {
    showErr('ناو یان وشەی نهێنی هەڵەیە.');
    return false;
  }
  user.lastLogin = new Date().toISOString();
  user.ip = '192.168.' + Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255);
  saveData();

  currentUser = { username: user.username, role: user.role };
  sessionStorage.setItem('current_user', JSON.stringify(currentUser));

  loginPage.classList.add('hidden');
  registerPage.classList.add('hidden');
  mainPage.classList.remove('hidden');

  displayName.textContent = currentUser.username;
  displayRole.textContent = currentUser.role;

  refreshAll();
  return true;
}

function doLogout() {
  currentUser = null;
  sessionStorage.removeItem('current_user');
  loginPage.classList.remove('hidden');
  registerPage.classList.add('hidden');
  mainPage.classList.add('hidden');
  userInput.value = 'admin';
  passInput.value = '1234';
  hideErr();
}

// ======================== ڕووداوەکان ========================
loginBtn.onclick = function() {
  const u = userInput.value.trim();
  const p = passInput.value.trim();
  if (!u || !p) { showErr('تکایە هەردوو خانە پڕ بکەوە.'); return; }
  doLogin(u, p);
};

// تۆمارکردن: دوای زیادکردن، ڕاستەوخۆ بچۆ ژوورەوە
regBtn.onclick = function() {
  const u = regUser.value.trim();
  const p = regPass.value.trim();
  if (!u || !p) { showErr2('تکایە هەردوو خانە پڕ بکەوە.'); return; }
  if (DATA.users.find(user => user.username === u)) {
    showErr2('ئەم ناوە پێشتر هەیە.');
    return;
  }
  // زیادکردنی بەکارهێنەری نوێ
  DATA.users.push({
    username: u,
    password: p,
    role: 'user',
    ip: '192.168.' + Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255),
    lastLogin: null
  });
  saveData();
  hideErr();

  // ڕاستەوخۆ بە هەمان ناو و وشەی نهێنی بچۆ ژوورەوە
  const success = doLogin(u, p);
  if (success) {
    // پاککردنەوەی خانەکانی تۆمارکردن
    regUser.value = '';
    regPass.value = '';
  }
};

logoutBtn.onclick = doLogout;

gotoReg.onclick = function() {
  loginPage.classList.add('hidden');
  registerPage.classList.remove('hidden');
  hideErr();
};
gotoLog.onclick = function() {
  registerPage.classList.add('hidden');
  loginPage.classList.remove('hidden');
  hideErr();
};

searchBtn.onclick = function() {
  renderOwnerPanel(searchUser.value);
};
searchUser.onkeyup = function(e) {
  if (e.key === 'Enter') renderOwnerPanel(searchUser.value);
};

addUserBtn.onclick = function() {
  const uname = newUserName.value.trim();
  const pass = newUserPass.value.trim();
  if (!uname || !pass) { alert('تکایە ناو و وشەی نهێنی پڕ بکەوە.'); return; }
  if (DATA.users.find(u => u.username === uname)) { alert('ئەم ناوە پێشتر هەیە.'); return; }
  DATA.users.push({
    username: uname,
    password: pass,
    role: 'user',
    ip: '192.168.' + Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255),
    lastLogin: null
  });
  saveData();
  newUserName.value = '';
  newUserPass.value = '';
  renderOwnerPanel(searchUser.value);
  updateStats();
  alert('بەکارهێنەر زیاد کرا!');
};

addCardBtn.onclick = function() {
  const title = newCardTitle.value.trim();
  if (!title) { alert('تکایە ناوی پرۆگرامەکە بنووسە.'); return; }
  const newId = DATA.cards.length ? Math.max(...DATA.cards.map(c=>c.id)) + 1 : 1;
  DATA.cards.push({
    id: newId,
    title: title,
    version: newCardVer.value.trim() || '—',
    desc: '',
    icon: 'fa-cube'
  });
  saveData();
  newCardTitle.value = '';
  newCardVer.value = '';
  renderCards();
};

// ======================== پشکنینی دۆخی ئێستا ========================
const savedSession = sessionStorage.getItem('current_user');
if (savedSession) {
  try {
    const tmp = JSON.parse(savedSession);
    const exists = DATA.users.find(u => u.username === tmp.username);
    if (exists) {
      currentUser = tmp;
      loginPage.classList.add('hidden');
      registerPage.classList.add('hidden');
      mainPage.classList.remove('hidden');
      displayName.textContent = currentUser.username;
      displayRole.textContent = currentUser.role;
      refreshAll();
    } else {
      sessionStorage.removeItem('current_user');
    }
  } catch(e) {}
}

console.log('✅ ماڵپەڕەکە ئامادەیە. بە admin / 1234 بچۆ ژوورەوە.');
</script>

</body>
</html>
